name: backend-ci

on:
  push:
    paths:
      - "app/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "scripts/**"
      - "tests/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/ci.yml"

jobs:
  non-docker-build-and-test:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e .[dev]
      - name: Build package (non-Docker)
        run: |
          pip install build
          python -m build
      - name: Run tests
        run: pytest -q

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build backend Docker image
        run: docker build -t crash-reporter-backend:ci .
